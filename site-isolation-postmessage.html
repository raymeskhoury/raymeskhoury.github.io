<html>
<body>
</body>
<script>
if (location.hash.includes('iframe')) {
  window.parent.postMessage('A message from the child frame', '*');
} else {
  const frame = document.createElement('iframe');
  frame.src = 'https://raymeskhoury.github.io/site-isolation-postmessage.html#iframe';
  document.body.appendChild(frame);

  window.addEventListener('message', function(e) {
    console.error(e.data);
    document.body.removeChild(frame);
    console.error('Finished test');
  });

}
</script>
</html>
