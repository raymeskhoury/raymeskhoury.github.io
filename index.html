<html>
<head>
<style>
#fields-container {
  position: fixed;
  top: 0;
  background-color: rgba(255, 255, 255, 0.8);
  padding: 10px;
}
</style>
<script type="text/javascript">

var features = [
  'geolocation',
  'camera',
  'microphone',
  'midi',
  'encrypted-media'
];

function update_feature_policy() {
  var feature_policy = '';
  for (var feature in features) {
    if (document.getElementById(features[feature]).checked)
      feature_policy += features[feature] + ';';
  }

  var permissions_frame = document.getElementById('permissions-frame');
  permissions_frame.allow = feature_policy;
  permissions_frame.src = 'https://permission.site';

  var flash_frame = document.getElementById('flash-frame');
  flash_frame.allow = feature_policy;
  flash_frame.src = 'https://www.onlinemictest.com/webcam-test-in-adobe-flash/';
}

function onload() {
  for (var feature in features) {
    var fields = document.getElementById('fields');

    var input = document.createElement('input');
    input.type = 'checkbox';
    input.id = features[feature];
    fields.appendChild(input);

    var label = document.createElement('label');
    label.htmlFor = input.id;
    label.innerHTML = features[feature];

    fields.appendChild(label);

    fields.appendChild(document.createElement('br'));
  }

  document.getElementById('fields').addEventListener('change',
                                                     update_feature_policy);
  update_feature_policy();
}

window.addEventListener('load', onload);
</script>
</head>
<body>
<div id="fields-container">
<fieldset id="fields">
  <legend>Feature Policy</legend>
</fieldset>
</div>
<iframe id="permissions-frame" width="750px" height="750px"></iframe>
<iframe id="flash-frame" width="750px" height="750px"></iframe>
</body>
</html>
